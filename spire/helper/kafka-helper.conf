# Where to reach the SPIRE agent Workload API (shared /var/run volume)
agent_address = "/var/run/spire-agent.sock"

# Where to write certs/keys inside the spiffe-helper container
# (mapped to /etc/kafka/secrets inside the cp-server container)
cert_dir = "/secrets"

# Filenames for the SVID and bundle
svid_file_name         = "kafka-cert.pem"
svid_key_file_name     = "kafka-key.pem"
svid_bundle_file_name  = "kafka-bundle.pem"

# Include intermediates in bundle (good default)
add_intermediates_to_bundle = true

# Optional: no command – Kafka will read files at startup
cmd      = ""
cmd_args = ""

# Let helper run as a daemon and keep certs fresh
renew_signal    = ""
exit_when_ready = false
